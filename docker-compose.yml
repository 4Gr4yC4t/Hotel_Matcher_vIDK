services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - hotel-db-data:/app/data
    networks:
      - app-network

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    depends_on:
      server:
        condition: service_healthy
    environment:
      - SERVER_URL=http://server:8000/match
    volumes:
      - ./output:/app/output
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  hotel-db-data:
